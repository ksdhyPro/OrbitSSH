version: '1.0'
name: master-pipeline1
displayName: Master
triggers:
  trigger: auto
  push:
    branches:
      include:
        - master
stages:
  - name: compile
    displayName: 编译
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: OrbitSSH Windows 打包
        nodeVersion: 20.10.0
        commands:
          - npm ci && rm -rf ./dist ./dist-electron ./release && npm run dist
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./release
        strategy: {}
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        strategy: {}
        dependsOn: build_nodejs
  - name: release
    displayName: 发布
    strategy: naturally
    trigger: auto
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: 发布
        dependArtifact: output
        version: 1.1.5.0
        autoIncrement: true
        strategy: {}
